<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <!-- CSP: разрешаем только локальные файлы и inline-скрипты -->
  <meta http-equiv="Content-Security-Policy" content="default-src 'self' 'unsafe-inline'; img-src 'self' data:; font-src 'self' data:;">
  
  <!-- Встроенная иконка (убирает 404) -->
  <link rel="icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>📊</text></svg>">
  
  <title>Калькулятор Обратного Лидгена</title>
  <link rel="stylesheet" href="styles.css">
  <!-- PDF-библиотека убрана -->
</head>
<body>
  <header class="header">
    <div class="container">
      <div class="logo">📊 OL Calculator</div>
      <nav>
        <a href="admin.html" class="nav-link">⚙️ Админ-панель</a>
      </nav>
    </div>
  </header>

  <main class="container main-grid">
    <section class="form-panel">
      <h2>Параметры партнёра</h2>
      <form id="calcForm" autocomplete="off">
  <!-- Название партнёра -->
  <div class="field-group">
    <label for="partnerName">Название компании-партнёра</label>
    <input type="text" id="partnerName" placeholder="ООО «Пример»" required pattern="^[\p{L}\p{N}\s«»\"'.,\-()]+$" title="Только буквы, цифры и базовые символы">
  </div>

  <!-- Утили РКО: красивый числовой ввод -->
  <div class="field-group">
    <label>Утили РКО / квартал</label>
    <div class="rko-input-wrapper">
      <input type="text" id="rkoInput" inputmode="numeric" pattern="[0-9]*" placeholder="0" maxlength="4" class="rko-number">
      <span class="rko-suffix">утилей</span>
      <div class="rko-hint">Мин. 10 • Шаг 10 • Автоокругление вниз</div>
    </div>
  </div>

  <!-- Доп. продукты (скрыто, но код оставлен для будущего) -->
  <div class="field-group hidden" id="addonsBlock">
    <label>Доп. продукты</label>
    <div class="checkbox-grid">
      <label class="check-item"><input type="checkbox" name="addon" value="acquiring"> Торговый эквайринг</label>
      <label class="check-item"><input type="checkbox" name="addon" value="qr"> Оплата по QR</label>
      <label class="check-item"><input type="checkbox" name="addon" value="profit"> Выгода</label>
      <label class="check-item"><input type="checkbox" name="addon" value="credit"> Кредиты</label>
      <label class="check-item"><input type="checkbox" name="addon" value="overnight"> Овернайты</label>
    </div>
  </div>

  <!-- Команда и менеджер (каскадные списки) -->
  <div class="field-group row">
    <div class="half">
      <label for="managerTeam">Команда</label>
      <select id="managerTeam" required>
        <option value="">Выберите команду</option>
        <option value="Крупные партнерства">Крупные партнерства</option>
        <option value="Отраслевые партнерства">Отраслевые партнерства</option>
      </select>
    </div>
    <div class="half">
      <label for="managerName">ФИО менеджера</label>
      <select id="managerName" required disabled>
        <option value="">Сначала выберите команду</option>
      </select>
    </div>
  </div>

  <div class="actions">
    <button type="submit" class="btn primary" id="calcBtn">📐 Рассчитать КП</button>
    <button type="button" class="btn secondary" id="resetBtn">Очистить</button>
  </div>
  <div id="errorBox" class="error-box hidden"></div>
</form>
    </section>

    <section class="preview-panel">
      <div class="preview-placeholder">
        <p>Заполните форму и нажмите «Рассчитать», чтобы сформировать коммерческое предложение</p>
      </div>
    </section>
  </main>

  <!-- Модальное окно с КП -->
  <div id="cpModal" class="modal hidden">
    <div class="modal-content">
      <button class="modal-close" id="closeModal">✕</button>
      <div id="cpContent" class="cp-container">
        <!-- Динамический контент -->
      </div>
      <div class="cp-actions">
        <button class="btn primary" id="copyBtn">📋 Скопировать текст</button>
        <button class="btn primary" id="pdfBtn">📥 Скачать PDF</button>
        <button class="btn secondary" id="mailBtn">✉️ Отправить на почту</button>
      </div>
    </div>
  </div>

  <script src="config.js"></script>
  <script src="app.js"></script>
</body>
</html>
