<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta http-equiv="Content-Security-Policy" content="default-src 'self' 'unsafe-inline' 'unsafe-eval'; script-src 'self' 'unsafe-inline' 'unsafe-eval'; style-src 'self' 'unsafe-inline'; font-src 'self' data:; img-src 'self' blob: data:;">
  <link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'%3E%3Ctext y='.9em' font-size='90'%3E%E2%9A%99%EF%B8%8F%3C/text%3E%3C/svg%3E">
  <title>Админ-панель | OL Calculator</title>
  <link rel="stylesheet" href="styles.css">
  <script src="config.js"></script>
  <style>
    :root { --admin-bg: #f8f9fa; --card-bg: #fff; --accent: #ffdd2d; --accent-hover: #ffe560; --text: #333; --text-muted: #666; --border: #e4d7c1; --success: #73b077; --error: #ff7b76; }
    body { background: var(--admin-bg); font-family: system-ui, -apple-system, sans-serif; color: var(--text); margin:0; }
    .admin-container { max-width: 840px; margin: 40px auto; padding: 0 20px; }
    .admin-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 24px; padding-bottom: 16px; border-bottom: 2px solid var(--border); flex-wrap:wrap; gap:10px; }
    .admin-title { font-size: 22px; font-weight: 800; }
    .btn { padding: 10px 18px; border: none; border-radius: 8px; font-weight: 600; cursor: pointer; transition: 0.2s; font-size: 14px; }
    .btn-primary { background: linear-gradient(135deg, var(--accent), var(--accent-hover)); color: var(--text); }
    .btn-primary:hover { transform: translateY(-1px); box-shadow: 0 4px 12px rgba(255,221,45,0.4); }
    .btn-secondary { background: #fff; border: 2px solid var(--border); color: var(--text); }
    .btn-secondary:hover { background: var(--border); }
    .btn-danger { background: #fff; border: 2px solid var(--error); color: var(--error); }
    .btn-danger:hover { background: var(--error); color: #fff; }
    .btn-sm { padding: 6px 10px; font-size: 12px; }
    .card { background: var(--card-bg); border-radius: 12px; padding: 24px; box-shadow: 0 4px 16px rgba(0,0,0,0.06); margin-bottom: 20px; }
    .menu-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 16px; }
    .menu-btn { display: flex; flex-direction: column; align-items: center; gap: 10px; padding: 20px; background: #fff; border: 2px solid var(--border); border-radius: 12px; cursor: pointer; transition: 0.2s; text-align: center; }
    .menu-btn:hover { border-color: var(--accent); transform: translateY(-2px); box-shadow: 0 6px 16px rgba(0,0,0,0.08); }
    .menu-icon { font-size: 26px; }
    .menu-title { font-weight: 700; font-size: 15px; }
    .menu-desc { font-size: 12px; color: var(--text-muted); line-height:1.3; }
    .form-group { margin-bottom: 14px; }
    .form-label { display: block; font-weight: 600; margin-bottom: 5px; font-size: 13px; }
    .form-input, .form-select, .form-textarea { width: 100%; padding: 9px 11px; border: 2px solid var(--border); border-radius: 8px; font-size: 14px; background: #faf9f7; font-family: inherit; }
    .form-input:focus, .form-select:focus, .form-textarea:focus { border-color: var(--accent); outline: none; box-shadow: 0 0 0 3px rgba(255,221,45,0.2); }
    .form-textarea { resize: vertical; min-height: 80px; max-height: 150px; }
    .row { display: flex; gap: 14px; }
    .col { flex: 1; }
    .team-block { background: #faf9f7; border-radius: 8px; padding: 14px; margin-bottom: 10px; border: 1px solid var(--border); }
    .team-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 8px; flex-wrap:wrap; gap:8px; }
    .team-name { font-weight: 700; font-size: 14px; }
    .manager-list { display: flex; flex-direction: column; gap: 5px; margin-top: 8px; }
    .manager-item { display: flex; justify-content: space-between; align-items: center; background: #fff; padding: 7px 10px; border-radius: 6px; border: 1px solid #eee; font-size: 13px; }
    .code-preview { width: 100%; height: 250px; font-family: 'Courier New', monospace; font-size: 12px; padding: 12px; background: #1e1e1e; color: #d4d4d4; border-radius: 8px; border: none; resize: vertical; }
    .alert { padding: 12px; border-radius: 8px; margin-bottom: 14px; font-size: 13px; line-height: 1.5; }
    .alert-info { background: #e3f2fd; color: #0d47a1; border: 1px solid #bbdefb; }
    .alert-success { background: #e8f5e9; color: #2e7d32; border: 1px solid #c8e6c9; }
    .alert-warning { background: #fff8e1; color: #f57f17; border: 1px solid #ffecb3; }
    .hidden { display: none !important; }
    .back-link { color: var(--text-muted); text-decoration: none; font-size: 13px; display: inline-flex; align-items: center; gap: 5px; margin-bottom: 16px; cursor: pointer; }
    .back-link:hover { color: var(--accent-hover); }
    .history-table { width: 100%; border-collapse: collapse; font-size: 13px; margin-top:12px; }
    .history-table th, .history-table td { padding: 8px; border-bottom: 1px solid var(--border); text-align: left; }
    .history-table th { background: #faf9f7; font-weight: 600; }
    #authOverlay { position:fixed; inset:0; background:rgba(241,238,232,0.95); display:flex; align-items:center;justify-content:center; z-index:999; backdrop-filter:blur(4px); }
    #authCard { background:#fff; padding:28px; border-radius:12px; box-shadow:0 10px 30px rgba(0,0,0,0.1); width:320px; text-align:center; }
    .debug-info { background: #f0f0f0; padding: 10px; border-radius: 8px; font-size: 12px; margin-bottom: 10px; white-space: pre-wrap; }
  </style>
</head>
<body>
  <div id="authOverlay">
    <div id="authCard">
      <h3 style="margin:0 0 12px">Админ-панель</h3>
      <input type="password" id="adminPass" class="form-input" placeholder="Введите пароль" style="margin:12px 0;">
      <button class="btn btn-primary" style="width:100%" onclick="checkAuth()">Войти</button>
      <p id="authError" style="color:#ff7b76;font-size:12px;margin-top:8px;"></p>
    </div>
  </div>
  <div class="admin-container">
    <div class="admin-header">
      <div class="admin-title">⚙️ Настройки калькулятора</div>
      <a href="index.html" class="btn btn-secondary btn-sm">← Калькулятор</a>
    </div>
    <div id="app"></div>
  </div>
  <script>
    const ADMIN_PASS = (typeof CONFIG !== 'undefined' && CONFIG.settings) ? CONFIG.settings.password : "Partner2026!";
    let appConfig = {};
    let configLoaded = false;

    function checkConfigLoad() {
      if (typeof window.CONFIG !== 'undefined' && window.CONFIG.managers && window.CONFIG.tools) return true;
      return false;
    }

    function initAdmin() {
      const app = document.getElementById('app');
      if (!checkConfigLoad()) {
        app.innerHTML = `
          <div class="alert alert-warning">
            <strong>⚠️ Ошибка загрузки данных</strong><br><br>
            Файл config.js не загрузился или имеет неверную структуру.<br>
            Проверьте:<br>
            1. Файл config.js находится в той же папке<br>
            2. В файле есть строка: <code>window.CONFIG = { ... };</code><br><br>
            <button class="btn btn-secondary btn-sm" onclick="location.reload()">🔄 Обновить страницу</button>
          </div>`;
        return;
      }
      try {
        appConfig = JSON.parse(JSON.stringify(window.CONFIG));
        configLoaded = true;
        checkAuth();
      } catch (e) {
        console.error('Error parsing CONFIG:', e);
        app.innerHTML = `<div class="alert alert-warning"><strong>⚠️ Ошибка парсинга данных</strong><br>${e.message}<br><button class="btn btn-secondary btn-sm" onclick="location.reload()">🔄 Обновить страницу</button></div>`;
      }
    }

    function checkAuth() {
      const pass = document.getElementById('adminPass').value;
      if (pass === ADMIN_PASS) {
        localStorage.setItem('admin_auth', 'granted');
        document.getElementById('authOverlay').style.display = 'none';
        render('main');
      } else if (localStorage.getItem('admin_auth') === 'granted') {
        document.getElementById('authOverlay').style.display = 'none';
        render('main');
      } else {
        document.getElementById('authError').textContent = pass ? 'Неверный пароль' : '';
      }
    }

    function render(view, data = {}) {
      const app = document.getElementById('app');
      app.innerHTML = '';
      switch(view) {
        case 'main': renderMain(); break;
        case 'edit': renderEditMenu(); break;
        case 'add-tool': renderAddTool(); break;
        case 'update-tool': renderUpdateTool(); break;
        case 'teams': renderTeams(); break;
        case 'history': renderHistory(); break;
        case 'preview': renderPreview(data.code); break;
      }
    }

    function renderMain() {
      document.getElementById('app').innerHTML = `
        <div class="card">
          <h3 style="margin:0 0 16px">Главное меню</h3>
          <div class="menu-grid">
            <div class="menu-btn" onclick="render('edit')"><div class="menu-icon">✏️</div><div class="menu-title">Внести изменения</div><div class="menu-desc">Инструменты, команды, пакеты</div></div>
            <div class="menu-btn" onclick="render('history')"><div class="menu-icon">📜</div><div class="menu-title">История запросов</div><div class="menu-desc">Кто и когда формировал КП</div></div>
          </div>
        </div>`;
    }

    function renderEditMenu() {
      document.getElementById('app').innerHTML = `
        <div class="back-link" onclick="render('main')">← Назад</div>
        <div class="alert alert-info">💡 Изменения сохраняются в браузере до нажатия кнопки «Сгенерировать код». После этого нужно заменить файл config.js на GitHub.</div>
        <div class="card">
          <h3 style="margin:0 0 14px">Что редактировать?</h3>
          <div class="menu-grid">
            <div class="menu-btn" onclick="render('add-tool')"><div class="menu-icon">➕</div><div class="menu-title">Добавить инструмент</div><div class="menu-desc">Новый формат лидогенерации</div></div>
            <div class="menu-btn" onclick="render('update-tool')"><div class="menu-icon">✏️</div><div class="menu-title">Обновить инструмент</div><div class="menu-desc">Изменить метрики или описание</div></div>
            <div class="menu-btn" onclick="render('teams')"><div class="menu-icon">👥</div><div class="menu-title">Команды и менеджеры</div><div class="menu-desc">Добавить/удалить сотрудников</div></div>
          </div>
        </div>`;
    }

    function renderAddTool() {
      document.getElementById('app').innerHTML = `
        <div class="back-link" onclick="render('edit')">← Назад</div>
        <div class="card">
          <h3 style="margin:0 0 14px">➕ Новый инструмент</h3>
          <form id="addForm">
            <div class="row"><div class="col"><label class="form-label">Название</label><input type="text" name="name" class="form-input" required placeholder="Напр.: Калькулятор"></div><div class="col"><label class="form-label">ID (латиница, без пробелов)</label><input type="text" name="id" class="form-input" required pattern="[a-z0-9_]+" title="Только a-z, 0-9, _" placeholder="calc_tool"></div></div>
            <div class="row" style="margin-top:12px"><div class="col"><label class="form-label">Порог утилей</label><input type="number" name="threshold" class="form-input" required min="10" step="10" placeholder="30"></div><div class="col"><label class="form-label">Тип</label><select name="type" class="form-select"><option value="placement">Размещение</option><option value="mailing">Рассылка</option><option value="editorial">Редакция</option><option value="event">Мероприятие</option><option value="integration">Интеграция</option><option value="mobile">Приложение</option><option value="media">Медиа</option></select></div></div>
            <div class="form-group" style="margin-top:12px"><label class="form-label">Описание</label><textarea name="description" class="form-input form-textarea" required placeholder="Кратко: что это и для кого"></textarea></div>
            <div class="row"><div class="col"><label class="form-label">Просмотров / мес</label><input type="text" name="views" class="form-input" required placeholder="10 000"></div><div class="col"><label class="form-label">Лидов / мес</label><input type="text" name="leads" class="form-input" required placeholder="150"></div></div>
            <div class="form-group" style="margin-top:12px"><label class="form-label">Ссылка</label><input type="url" name="link" class="form-input" placeholder="https://www.tbank.ru/business/"></div>
            <button type="submit" class="btn btn-primary" style="margin-top:14px;width:100%">Сгенерировать код</button>
          </form>
        </div>`;
      
      setTimeout(() => {
        const form = document.getElementById('addForm');
        if (form) {
          form.onsubmit = (e) => {
            e.preventDefault();
            try {
              const f = Object.fromEntries(new FormData(e.target));
              if(!appConfig.tools) appConfig.tools = [];
              if(appConfig.tools.find(t => t.id === f.id)) { alert('❌ Такой ID уже существует!'); return; }
              
              appConfig.tools.push({ 
                id: f.id, 
                name: f.name, 
                cost: parseInt(f.threshold) || 0, 
                type: f.type, 
                tooltip: f.description, 
                link: f.link || '#' 
              });
              
              if(!appConfig.tools_metrics) appConfig.tools_metrics = {};
              appConfig.tools_metrics[f.id] = { description: f.description, views: f.views, leads: f.leads };
              render('preview', { code: generateCode() });
            } catch (err) { alert('Ошибка при добавлении: ' + err.message); }
          };
        }
      }, 100);
    }

    function renderUpdateTool() {
      if(!configLoaded || !appConfig.tools || appConfig.tools.length === 0) {
        document.getElementById('app').innerHTML = `<div class="back-link" onclick="render('edit')">← Назад</div><div class="alert alert-warning">⚠️ Список инструментов пуст. Проверьте, что config.js загружен корректно.</div>`;
        return;
      }
      const catalog = appConfig.tools;
      const opts = catalog.map(t => `<option value="${t.id}">${t.name} (${t.cost} утилей)</option>`).join('');
      
      document.getElementById('app').innerHTML = `
        <div class="back-link" onclick="render('edit')">← Назад</div>
        <div class="card">
          <h3 style="margin:0 0 14px">✏️ Обновить инструмент</h3>
          <div class="alert alert-info">Сейчас в системе: ${catalog.length} инструментов</div>
          <label class="form-label">Выберите для редактирования</label>
          <select id="selTool" class="form-select"><option value="">-- Выберите инструмент --</option>${opts}</select>
          <div id="editBox" class="hidden" style="margin-top:14px; border-top:1px solid var(--border); padding-top:14px">
            <form id="updForm">
              <input type="hidden" name="id">
              <div class="row"><div class="col"><label class="form-label">Название</label><input type="text" name="name" class="form-input"></div><div class="col"><label class="form-label">Порог утилей</label><input type="number" name="threshold" class="form-input" min="10" step="10"></div></div>
              <div class="form-group" style="margin-top:12px"><label class="form-label">Описание</label><textarea name="description" class="form-input form-textarea"></textarea></div>
              <div class="row"><div class="col"><label class="form-label">Просмотров / мес</label><input type="text" name="views" class="form-input"></div><div class="col"><label class="form-label">Лидов / мес</label><input type="text" name="leads" class="form-input"></div></div>
              <button type="submit" class="btn btn-primary" style="margin-top:14px;width:100%">Применить и сгенерировать код</button>
            </form>
          </div>
        </div>`;
      
      setTimeout(() => {
        const sel = document.getElementById('selTool');
        if (sel) {
          sel.onchange = (e) => {
            const id = e.target.value;
            const box = document.getElementById('editBox');
            if(!id) return box.classList.add('hidden');
            const tool = appConfig.tools.find(x => x.id === id);
            const metric = appConfig.tools_metrics[id] || {};
            if(tool) {
              const f = document.getElementById('updForm');
              if(f) {
                f.id.value = id; 
                f.name.value = tool.name; 
                f.threshold.value = tool.cost;
                f.description.value = metric.description || tool.tooltip || ''; 
                f.views.value = metric.views || ''; 
                f.leads.value = metric.leads || '';
                box.classList.remove('hidden');
              }
            }
          };
        }
        const updForm = document.getElementById('updForm');
        if (updForm) {
          updForm.onsubmit = (e) => {
            e.preventDefault();
            try {
              const f = Object.fromEntries(new FormData(e.target));
              const idx = appConfig.tools.findIndex(t => t.id === f.id);
              if(idx > -1) {
                appConfig.tools[idx].name = f.name;
                appConfig.tools[idx].cost = parseInt(f.threshold) || 0;
                appConfig.tools[idx].tooltip = f.description;
                if(!appConfig.tools_metrics[f.id]) appConfig.tools_metrics[f.id] = {};
                appConfig.tools_metrics[f.id].description = f.description;
                appConfig.tools_metrics[f.id].views = f.views;
                appConfig.tools_metrics[f.id].leads = f.leads;
              }
              render('preview', { code: generateCode() });
            } catch (err) { alert('Ошибка при обновлении: ' + err.message); }
          };
        }
      }, 100);
    }

    function renderTeams() {
      const html = `
        <div class="back-link" onclick="render('edit')">← Назад</div>
        <div class="alert alert-warning">⚠️ После сохранения замените config.js на GitHub, иначе новые менеджеры не появятся в списках.</div>
        <div class="card">
          <h3 style="margin:0 0 14px">Управление командами</h3>
          <div id="teamsBox"></div>
          <div style="margin-top:16px; padding-top:12px; border-top:1px solid var(--border)">
            <label class="form-label">Новая команда</label>
            <div class="row"><input type="text" id="newTeam" class="form-input" placeholder="Напр.: E-commerce"><button class="btn btn-secondary btn-sm" onclick="addTeam()">➕ Добавить</button></div>
          </div>
          <button class="btn btn-primary" style="margin-top:18px;width:100%" onclick="render('preview', {code: generateCode()})">📦 Сгенерировать финальный код</button>
        </div>`;
      document.getElementById('app').innerHTML = html;
      renderTeamsList();
    }

    function renderTeamsList() {
      const box = document.getElementById('teamsBox'); 
      if(!box) return;
      if(!appConfig.managers) appConfig.managers = {};
      box.innerHTML = Object.entries(appConfig.managers).map(([team, managers]) => `
        <div class="team-block">
          <div class="team-header">
            <div class="team-name">${team}</div>
            <button class="btn btn-danger btn-sm" onclick="removeTeam('${team}')">Удалить команду</button>
          </div>
          <div style="margin:8px 0"><label class="form-label" style="font-size:12px">Добавить менеджера</label>
            <div class="row"><input type="text" class="form-input" id="mgr_${team.replace(/\s/g,'')}" placeholder="ФИО"><button class="btn btn-secondary btn-sm" onclick="addMgr('${team}')">+</button></div>
          </div>
          <div class="manager-list">
            ${(managers || []).map((m, i) => `<div class="manager-item"><span>${m}</span><button class="btn btn-danger btn-sm" onclick="delMgr('${team}',${i})">Удалить</button></div>`).join('')}
          </div>
        </div>`).join('');
    }

    window.addTeam = () => { 
      const n = document.getElementById('newTeam').value.trim(); 
      if(n && !appConfig.managers[n]) { appConfig.managers[n] = []; renderTeamsList(); } 
    };
    window.addMgr = (team) => { 
      const i = document.getElementById(`mgr_${team.replace(/\s/g,'')}`); 
      const v = i.value.trim(); 
      if(v && !appConfig.managers[team].includes(v)) { appConfig.managers[team].push(v); i.value=''; renderTeamsList(); } 
    };
    window.removeTeam = (team) => { 
      if(confirm(`Удалить "${team}"?`)) { delete appConfig.managers[team]; renderTeamsList(); } 
    };
    window.delMgr = (team, idx) => { 
      appConfig.managers[team].splice(idx, 1); renderTeamsList(); 
    };

    function renderHistory() {
      const hist = JSON.parse(localStorage.getItem('cp_history') || '[]');
      document.getElementById('app').innerHTML = `
        <div class="back-link" onclick="render('main')">← Назад</div>
        <div class="card">
          <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:16px;flex-wrap:wrap;gap:10px">
            <h3 style="margin:0">История генераций</h3>
            <div style="display:flex;gap:10px;flex-wrap:wrap">
              <button class="btn btn-secondary btn-sm" onclick="expHist()">Скачать CSV</button>
              <button class="btn btn-danger btn-sm" onclick="if(confirm('Очистить всю историю?')){localStorage.removeItem('cp_history');render('history');}">Очистить</button>
            </div>
          </div>
          ${hist.length ? `<div style="overflow-x:auto"><table class="history-table"><thead><tr><th>Дата</th><th>Партнёр</th><th>Команда</th><th>Менеджер</th><th>Пакет</th><th>Утилей</th></tr></thead><tbody>${hist.map(h => `<tr><td>${new Date(h.timestamp).toLocaleString()}</td><td><b>${h.partner_name}</b></td><td>${h.manager_team || '-'}</td><td>${h.manager_name || '-'}</td><td>${h.package_name}</td><td>${h.total_units}</td></tr>`).join('')}</tbody></table></div>` : '<p style="margin-top:12px;color:var(--text-muted)">История пуста. Менеджеры ещё не генерировали КП.</p>'}
        </div>`;
    }
    
    window.expHist = () => {
      const hist = JSON.parse(localStorage.getItem('cp_history') || '[]');
      if(!hist.length) return alert('История пуста');
      const headers = ['Дата','Партнёр','Команда','Менеджер','Пакет','Утилей','Вариантов','Версия'];
      const rows = hist.map(h => [new Date(h.timestamp).toLocaleString(), `"${h.partner_name}"`, `"${h.manager_team || ''}"`, `"${h.manager_name || ''}"`, h.package_name, h.total_units, h.variants_count || 0, h.config_version || '']);
      const csvContent = [headers.join(','), ...rows.map(r => r.join(','))].join('\n');
      const blob = new Blob(['\uFEFF' + csvContent], {type: 'text/csv;charset=utf-8;'});
      const a = document.createElement('a');
      a.href = URL.createObjectURL(blob);
      a.download = `history_${new Date().toISOString().slice(0,10)}.csv`;
      a.click();
    };

    function generateCode() {
      return `window.CONFIG = ${JSON.stringify(appConfig, null, 2)};`;
    }

    function renderPreview(code) {
      document.getElementById('app').innerHTML = `
        <div class="back-link" onclick="render('edit')">← Назад в меню изменений</div>
        <div class="alert alert-warning">🔴 ВАЖНО: Чтобы изменения появились на сайте, выполните 3 шага:<br>1. Скачайте сгенерированный файл<br>2. Замените им <code>config.js</code> в вашем GitHub-репозитории<br>3. Обновите страницу калькулятора (Ctrl+R)</div>
        <div class="card">
          <h3 style="margin:0 0 10px">Готовый код config.js</h3>
          <textarea class="code-preview" id="codeOut" readonly>${code}</textarea>
          <div style="margin-top:12px;display:flex;gap:10px;flex-wrap:wrap">
            <button class="btn btn-primary" onclick="navigator.clipboard.writeText(document.getElementById('codeOut').value).then(b=>{b.textContent=' ✅ Скопировано !';setTimeout(()=>b.textContent='Копировать',1500)})">📋 Копировать</button>
            <button class="btn btn-secondary" onclick="const b=new Blob([document.getElementById('codeOut').value],{type:'text/javascript'}),a=document.createElement('a');a.href=URL.createObjectURL(b);a.download='config.js';a.click()">💾 Скачать файл</button>
          </div>
        </div>`;
    }

    window.addEventListener('DOMContentLoaded', initAdmin);
  </script>
</body>
</html>
