<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <!-- CSP: разрешаем только локальные файлы и inline-скрипты -->
  <meta http-equiv="Content-Security-Policy" content="default-src 'self' 'unsafe-inline'; img-src 'self' data:; font-src 'self' data:;">
  
  <!-- Встроенная иконка (убирает 404) -->
  <link rel="icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>📊</text></svg>">
  
  <title>Калькулятор Обратного Лидгена</title>
  <link rel="stylesheet" href="styles.css">
  <!-- PDF-библиотека убрана -->
</head>
<body>
  <header class="header">
    <div class="container"><a href="index.html" class="nav-link">← Вернуться к калькулятору</a></div>
  </header>
  <main class="container admin-grid">
    <section class="admin-card">
      <h2>📦 Редактор конфигурации</h2>
      <textarea id="configEditor" class="code-editor" spellcheck="false"></textarea>
      <div class="admin-actions">
        <button class="btn primary" id="downloadConfig">💾 Скачать config.js</button>
        <button class="btn secondary" id="validateConfig">✅ Проверить JSON</button>
      </div>
      <p id="configStatus" class="status-text"></p>
    </section>

    <section class="admin-card">
      <h2>📜 История генераций (localStorage)</h2>
      <div id="historyList" class="history-list"></div>
      <div class="admin-actions">
        <button class="btn danger" id="clearHistory">🗑 Сбросить историю</button>
        <button class="btn secondary" id="exportHistory">📥 Экспорт JSON</button>
      </div>
    </section>
  </main>
  <script src="config.js"></script>
  <script>
    // Быстрая авторизация
    const pwd = prompt('Пароль админ-панели:');
    if(pwd !== CONFIG.settings.password) { document.body.innerHTML='<h2 style="padding:40px;color:var(--error)">Доступ запрещён</h2>'; throw new Error('Auth'); }

    const editor = document.getElementById('configEditor');
    const status = document.getElementById('configStatus');
    const historyList = document.getElementById('historyList');

    function loadAdmin() {
      editor.value = JSON.stringify(CONFIG, null, 2);
      renderHistory();
    }

    function renderHistory() {
      const hist = JSON.parse(localStorage.getItem('cp_history') || '[]');
      if(!hist.length) return historyList.innerHTML = '<p class="empty">История пуста</p>';
      historyList.innerHTML = hist.map(h => `
        <div class="history-item">
          <strong>${h.partner_name}</strong> | ${h.package_tier} | ${h.total_units} утилей
          <small>${new Date(h.timestamp).toLocaleString()}</small>
          <span class="badge">v${h.config_version}</span>
        </div>`).join('');
    }

    document.getElementById('validateConfig').onclick = () => {
      try { JSON.parse(editor.value); status.textContent = '✅ JSON валиден'; status.className = 'status-text success'; }
      catch(e) { status.textContent = `❌ Ошибка: ${e.message}`; status.className = 'status-text error'; }
    };

    document.getElementById('downloadConfig').onclick = () => {
      const blob = new Blob([`window.CONFIG = ${editor.value};`], {type: 'application/javascript'});
      const a = document.createElement('a'); a.href = URL.createObjectURL(blob); a.download = 'config.js'; a.click();
    };

    document.getElementById('clearHistory').onclick = () => {
      if(confirm('Удалить всю историю из localStorage?')) {
        localStorage.removeItem('cp_history'); renderHistory();
      }
    };

    document.getElementById('exportHistory').onclick = () => {
      const blob = new Blob([localStorage.getItem('cp_history')||'[]'], {type:'application/json'});
      const a = document.createElement('a'); a.href = URL.createObjectURL(blob); a.download = 'history.json'; a.click();
    };

    loadAdmin();
  </script>
</body>
</html>
